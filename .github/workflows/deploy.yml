name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Manueller Trigger über GitHub UI möglich
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # config.js aus GitHub Secrets erzeugen
      # (Secrets setzen unter: Settings → Secrets and variables → Actions)
      - name: Credentials aus Secrets erstellen
        run: |
          cat > config.js << 'EOF'
          window.VENCLY_CONFIG = {
            supabaseUrl:     '${{ secrets.SUPABASE_URL }}',
            supabaseAnonKey: '${{ secrets.SUPABASE_ANON_KEY }}',
          };
          EOF

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v4

      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deployen
        id: deployment
        uses: actions/deploy-pages@v4
